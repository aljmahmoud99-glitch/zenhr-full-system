<section class="change-password-page" [attr.dir]="lang === 'ar' ? 'rtl' : 'ltr'" [attr.lang]="lang">
  <div class="change-password-card">
    <span class="eyebrow">{{ lang === 'ar' ? 'حماية الحساب' : 'Account security' }}</span>
    <h1>{{ lang === 'ar' ? 'تغيير كلمة المرور' : 'Change password' }}</h1>
    <p>
      {{ lang === 'ar'
        ? 'يجب تغيير كلمة المرور المؤقتة قبل متابعة استخدام النظام.'
        : 'You must change your temporary password before continuing.' }}
    </p>

    <div class="alert-error" *ngIf="error()">{{ error() }}</div>

    <label class="field">
      <span>{{ lang === 'ar' ? 'كلمة المرور الحالية' : 'Current password' }}</span>
      <input [(ngModel)]="currentPassword" type="password">
    </label>

    <label class="field">
      <span>{{ lang === 'ar' ? 'كلمة المرور الجديدة' : 'New password' }}</span>
      <input [(ngModel)]="newPassword" type="password">
    </label>

    <label class="field">
      <span>{{ lang === 'ar' ? 'تأكيد كلمة المرور' : 'Confirm password' }}</span>
      <input [(ngModel)]="confirmPassword" type="password">
    </label>

    <button type="button" (click)="submit()" [disabled]="loading()">
      {{ loading() ? '...' : (lang === 'ar' ? 'حفظ كلمة المرور' : 'Save password') }}
    </button>
  </div>
</section>
