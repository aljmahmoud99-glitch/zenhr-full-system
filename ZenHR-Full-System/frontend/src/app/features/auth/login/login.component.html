<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="login-logo">🏢</div>
      <h1 class="login-title">ZenJO</h1>
      <p class="login-subtitle">
        <span *ngIf="lang()==='ar'">نظام إدارة الموارد البشرية الأردنية</span>
        <span *ngIf="lang()!=='ar'">Jordanian HR Management System</span>
      </p>
      <button class="lang-btn" (click)="toggleLang()">
        {{lang() === 'ar' ? 'English' : 'عربي'}}
      </button>
    </div>

    <!-- Error -->
    <div class="alert alert-error" *ngIf="error()">{{error()}}</div>

    <!-- Form -->
    <form (ngSubmit)="login()" #loginForm="ngForm">
      <div class="form-group">
        <label class="form-label">
          <span *ngIf="lang()==='ar'">اسم المستخدم</span>
          <span *ngIf="lang()!=='ar'">Username</span>
        </label>
        <input type="text" class="form-control" [(ngModel)]="username" name="username"
               [placeholder]="lang()==='ar' ? 'أدخل اسم المستخدم' : 'Enter username'"
               autocomplete="username" autofocus>
      </div>

      <div class="form-group">
        <label class="form-label">
          <span *ngIf="lang()==='ar'">كلمة المرور</span>
          <span *ngIf="lang()!=='ar'">Password</span>
        </label>
        <div class="password-wrap">
          <input [type]="showPassword() ? 'text' : 'password'" class="form-control"
                 [(ngModel)]="password" name="password"
                 [placeholder]="lang()==='ar' ? 'أدخل كلمة المرور' : 'Enter password'"
                 autocomplete="current-password">
          <button type="button" class="eye-btn" (click)="toggleShowPassword()">
            <span class="material-icons">{{showPassword() ? 'visibility_off' : 'visibility'}}</span>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full login-submit" [disabled]="loading()">
        <span class="material-icons spin-icon" *ngIf="loading()">refresh</span>
        <span *ngIf="!loading() && lang()==='ar'">تسجيل الدخول</span>
        <span *ngIf="!loading() && lang()!=='ar'">Sign In</span>
        <span *ngIf="loading() && lang()==='ar'">جاري التحقق...</span>
        <span *ngIf="loading() && lang()!=='ar'">Signing in...</span>
      </button>
    </form>

    <!-- Demo Accounts -->
    <div class="demo-section">
      <p class="demo-title">
        <span *ngIf="lang()==='ar'">حسابات تجريبية</span>
        <span *ngIf="lang()!=='ar'">Demo Accounts</span>
      </p>
      <div class="demo-grid">
        <button *ngFor="let acc of demoAccounts" class="demo-btn" (click)="fill(acc)">
          <span class="demo-user">{{acc.user}}</span>
          <span class="demo-role">{{lang()==='ar' ? acc.roleAr : acc.roleEn}}</span>
        </button>
      </div>
    </div>
  </div>
</div>
