openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: ZenJO — Jordanian HRMS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: employees
    description: Employee management
  - name: departments
    description: Department management
  - name: job-titles
    description: Job title management
  - name: leave
    description: Leave management
  - name: payroll
    description: Payroll management
  - name: attendance
    description: Attendance tracking
  - name: documents
    description: Document management
  - name: assets
    description: Asset management
  - name: dashboard
    description: Dashboard & analytics
  - name: lookups
    description: Reference/lookup data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent HR activity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/leave-stats:
    get:
      operationId: getLeaveStats
      tags: [dashboard]
      summary: Leave stats by type
      responses:
        "200":
          description: Leave statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveStats"

  /dashboard/headcount-by-department:
    get:
      operationId: getHeadcountByDepartment
      tags: [dashboard]
      summary: Headcount grouped by department
      responses:
        "200":
          description: Headcount by department
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeptHeadcount"

  /dashboard/payroll-trend:
    get:
      operationId: getPayrollTrend
      tags: [dashboard]
      summary: Monthly payroll trend (last 6 months)
      responses:
        "200":
          description: Payroll trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollTrendItem"

  # EMPLOYEES
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, terminated, resigned, retired]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Employee list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create a new employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeBody"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: terminateEmployee
      tags: [employees]
      summary: Terminate/archive employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TerminateEmployeeBody"
      responses:
        "200":
          description: Employee terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}/documents:
    get:
      operationId: getEmployeeDocuments
      tags: [employees]
      summary: Get employee documents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /employees/{id}/leave-balances:
    get:
      operationId: getEmployeeLeaveBalances
      tags: [employees]
      summary: Get employee leave balances
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leave balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveBalance"

  # DEPARTMENTS
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: Department list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentBody"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentBody"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # JOB TITLES
  /job-titles:
    get:
      operationId: listJobTitles
      tags: [job-titles]
      summary: List job titles
      responses:
        "200":
          description: Job title list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobTitle"
    post:
      operationId: createJobTitle
      tags: [job-titles]
      summary: Create job title
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobTitleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobTitle"

  /job-titles/{id}:
    patch:
      operationId: updateJobTitle
      tags: [job-titles]
      summary: Update job title
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobTitleBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobTitle"
    delete:
      operationId: deleteJobTitle
      tags: [job-titles]
      summary: Delete job title
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # LEAVE
  /leave/requests:
    get:
      operationId: listLeaveRequests
      tags: [leave]
      summary: List leave requests
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, cancelled]
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Leave request list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRequest"
    post:
      operationId: createLeaveRequest
      tags: [leave]
      summary: Submit leave request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaveRequestBody"
      responses:
        "201":
          description: Leave request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leave/requests/{id}:
    get:
      operationId: getLeaveRequest
      tags: [leave]
      summary: Get leave request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leave request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leave/requests/{id}/approve:
    post:
      operationId: approveLeaveRequest
      tags: [leave]
      summary: Approve leave request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveLeaveBody"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leave/requests/{id}/reject:
    post:
      operationId: rejectLeaveRequest
      tags: [leave]
      summary: Reject leave request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectLeaveBody"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leave/policies:
    get:
      operationId: listLeavePolicies
      tags: [leave]
      summary: List leave policies
      responses:
        "200":
          description: Leave policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeavePolicy"
    post:
      operationId: createLeavePolicy
      tags: [leave]
      summary: Create leave policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeavePolicyBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeavePolicy"

  /leave/policies/{id}:
    patch:
      operationId: updateLeavePolicy
      tags: [leave]
      summary: Update leave policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeavePolicyBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeavePolicy"

  # PAYROLL
  /payroll/runs:
    get:
      operationId: listPayrollRuns
      tags: [payroll]
      summary: List payroll runs
      parameters:
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
        - name: month
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Payroll runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollRun"
    post:
      operationId: createPayrollRun
      tags: [payroll]
      summary: Create/process payroll run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePayrollRunBody"
      responses:
        "201":
          description: Payroll run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRun"

  /payroll/runs/{id}:
    get:
      operationId: getPayrollRun
      tags: [payroll]
      summary: Get payroll run details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payroll run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRunDetail"

  /payroll/runs/{id}/approve:
    post:
      operationId: approvePayrollRun
      tags: [payroll]
      summary: Approve payroll run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRun"

  /payroll/slips:
    get:
      operationId: listPayslips
      tags: [payroll]
      summary: List payslips
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
        - name: month
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Payslips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payslip"

  /payroll/slips/{id}:
    get:
      operationId: getPayslip
      tags: [payroll]
      summary: Get payslip details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payslip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payslip"

  # ATTENDANCE
  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/clock-in:
    post:
      operationId: clockIn
      tags: [attendance]
      summary: Clock in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockInBody"
      responses:
        "201":
          description: Clocked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/clock-out:
    post:
      operationId: clockOut
      tags: [attendance]
      summary: Clock out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockOutBody"
      responses:
        "200":
          description: Clocked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/summary:
    get:
      operationId: getAttendanceSummary
      tags: [attendance]
      summary: Attendance summary for a period
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceSummary"

  # DOCUMENTS
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: expiringWithinDays
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Upload document record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ASSETS
  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List assets
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
            enum: [available, assigned, maintenance, retired]
      responses:
        "200":
          description: Assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    patch:
      operationId: updateAsset
      tags: [assets]
      summary: Update asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /assets/{id}/assign:
    post:
      operationId: assignAsset
      tags: [assets]
      summary: Assign asset to employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignAssetBody"
      responses:
        "200":
          description: Asset assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}/return:
    post:
      operationId: returnAsset
      tags: [assets]
      summary: Return asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  # LOOKUPS
  /lookups/nationalities:
    get:
      operationId: listNationalities
      tags: [lookups]
      summary: List nationalities
      responses:
        "200":
          description: Nationalities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Nationality"

  /lookups/cities:
    get:
      operationId: listCities
      tags: [lookups]
      summary: List cities
      responses:
        "200":
          description: Cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"

  /lookups/banks:
    get:
      operationId: listBanks
      tags: [lookups]
      summary: List Jordanian banks
      responses:
        "200":
          description: Banks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bank"

  /lookups/document-types:
    get:
